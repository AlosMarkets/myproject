<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --topbar-bg: #ffffff;
            --text-primary: #1c1e21;
            --text-secondary: #606770;
            --shadow: rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #18191a;
                --container-bg: #242526;
                --topbar-bg: #242526;
                --text-primary: #e4e6eb;
                --text-secondary: #b0b3b8;
                --shadow: rgba(0,0,0,0.3);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }
        .top-bar {
            width: 100%;
            background-color: var(--topbar-bg);
            padding: 1rem 2rem;
            box-shadow: 0 2px 4px var(--shadow);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .top-bar .logo {
            font-weight: bold;
            color: var(--text-primary);
        }
        .top-bar nav a {
            text-decoration: none;
            color: var(--text-secondary);
            margin-left: 1.5rem;
        }
        .top-bar nav a:hover {
            color: var(--text-primary);
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: var(--container-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px var(--shadow);
        }
        h1 {
            color: var(--text-primary);
            margin: 0;
        }
        p {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">MyBrand</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </div>
    <div class="container">
        <h1>Hello World</h1>
        <p>Welcome to your new landing page.</p>
    </div>
</body>
</html>
